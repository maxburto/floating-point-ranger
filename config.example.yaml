# gpu-manager configuration (example).
# Copy to config.yaml and adjust. UUIDs come from: nvidia-smi --query-gpu=name,uuid --format=csv
bind: 0.0.0.0
port: 8768
hold_dir: /run/gpu-manager           # hold-<GPU-UUID>[.reason] marker files pause new admission

gpus:
  - uuid: GPU-00000000-0000-0000-0000-000000000000
    name: Example RTX 3060 12GB
    role: batch                      # batch | interactive
    host: local

# Legacy/foreign flock lease files to surface (read-only probe).
locks: []
#  - path: /run/gpu-3060.lock
#    gpu_uuid: GPU-00000000-0000-0000-0000-000000000000
#    label: ocr-worker lease

# External job queues merged into /v1/gpu/queue.
sources: []
#  - kind: sqlite-photogrammetry
#    initiator: photogrammetry
#    options: { path: /opt/photogrammetry/catalog.db }
#  - kind: exapp-jobs
#    initiator: my_exapp
#    enabled: false                  # needs EXAPP_USER/EXAPP_PASSWORD in the env file
#    options: { url: https://cloud.example.com/index.php/apps/app_api/proxy/my_exapp/api/v1/jobs }

# Bounded batch spillover onto an interactive card (optional). On an interactive-role
# gpu entry, set batch_spillover_max_mib: <MiB> to let role-ask batch jobs that declare
# a VRAM floor at or below the cap use the card as a LAST resort (batch cards are always
# tried first; holds still pause admission; running jobs are never preempted; 0 = off).
#  - uuid: GPU-00000000-0000-0000-0000-000000000000
#    name: Example RTX 3060 Ti
#    role: interactive
#    batch_spillover_max_mib: 4096

# Stall-watch interactive-card coverage (optional; requires stall_watch.enabled).
# watch_interactive: true lets leases on interactive cards go through the normal stall
# pathway; desktop_exempt_patterns exempts leases whose owner/cmdline matches (wrapped
# desktop applications) — they are left alone even when they look stalled.
#stall_watch:
#  watch_interactive: true
#  desktop_exempt_patterns: [blender, gimp, steam]

# Dead-holder ("zombie") lease reaping. A granted lease whose registered pid no longer exists
# has no work behind it, so it is expired after this many seconds of heartbeat silence rather
# than waiting out the client-chosen ttl_s (which has no server-side ceiling — a client asking
# for ttl_s: 900 keeps its full VRAM floor booked for 15 min after its process dies).
# This is bookkeeping, not eviction: nothing is signalled, so it is deliberately independent of
# stall_watch.enforce, which gates the different question of a live-but-idle job.
# Applies only to leases that registered a pid. 0 disables the short clock (pure ttl_s).
#leases:
#  zombie_ttl_s: 300
